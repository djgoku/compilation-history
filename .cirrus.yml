env:
  MISE_YES: "1"

check_task:
  name: "Check (Emacs ${EMACS_VERSION})"
  container:
    dockerfile: .cirrus.Dockerfile
    docker_arguments:
      EMACS_VERSION: ${EMACS_VERSION}
  matrix:
    - env:
        EMACS_VERSION: "29.4"
    - env:
        EMACS_VERSION: "30.1"
    - env:
        EMACS_VERSION: "master"
  allow_failures: $EMACS_VERSION == 'master'
  setup_git_script:
    - rm -f .git
    - git init .
    - git config user.email "ci@test"
    - git config user.name "CI"
    - git add -A
    - git commit -m "ci"
  check_script:
    - emacs --version
    - mise run check
